name: PR Check

on:
  pull_request:
    branches: [main]
    # docs/governance go direct to main (no PR) by convention; if a PR is
    # docs-only anyway, skip heavy CI. See DECISIONS.md 2026-05-16.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'CLAUDE.md'

jobs:
  typecheck:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm lint
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run --if-present test
