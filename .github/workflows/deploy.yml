name: Deploy

on:
  push:
    branches: [main]

# Product deploy jobs are added per product as they launch (see Волна 2
# deploy-template task). food-agent job removed 2026-05-15 (archived as
# git tag food-agent-archive).

jobs:
  deploy-admin-bot:
    name: Deploy admin-bot → Railway
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'platform/admin-bot') ||
      contains(toJson(github.event.commits.*.modified), 'packages/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @portfolio/admin-bot build

      - uses: bervProject/railway-deploy@v1
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: admin-bot
